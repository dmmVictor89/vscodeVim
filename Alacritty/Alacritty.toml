# alacritty.toml

[env]
TERM = "xterm-256color"

[general]
live_config_reload = true


[window]
opacity = 1
startup_mode = "Maximized"


[font]
normal.family = "D2Coding"
size = 11



[keyboard]
bindings = [
    # Ctrl+Space: NUL 문자 (tmux prefix)
    # { key = "Space", mods = "Control", chars = "\u0000" },
    { key = "Space", mods = "Shift", chars = "\u0000" },
    # Ctrl+V: 붙여넣기
    { key = "V", mods = "Control", action = "Paste" },
    # Ctrl+Shift+V: 붙여넣기 (기본 동작 유지)
    { key = "V", mods = "Control|Shift", action = "Paste" },
    # Ctrl+Shift+C: 복사 (기본 동작 유지)
    { key = "C", mods = "Control|Shift", action = "Copy" },
]