# prefix 변경 Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g mouse on
set -s set-clipboard on

# set -ga update-environment " LANG LC_ALL LC_CTYPE"  # 셸의 로케일을 tmux가 물려받게 함
set -g default-terminal "tmux-256color"             # 권장 terminfo

# plugin list start ==============================================================================================================================
set -g @plugin 'tmux-plugins/tpm' # 플러그인 매니저
set -g @plugin 'tmux-plugins/tmux-sensible' # 각종 편의 도구

set -g @catppuccin_flavour 'mocha'
set -g @plugin 'christoomey/vim-tmux-navigator'
# vim-tmux-navigator 기본 tmux 바인딩 비활성화
set -g @vim_tmux_navigator_no_mappings 1

set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank' # clipboard 연동
set -g @plugin 'tmux-plugins/tmux-resurrect' # 화면 구성 저장
# set -g @resurrect-capture-pane-contents 'on'

# set -g @resurrect-processes 'ssh vim nvim less more tail top htop'
# set -g @resurrect-strategy-vim 'session'
# set -g @resurrect-dir '~/.tmux/plugins/tmux-resurrect/env'

set -g @plugin 'tmux-plugins/tmux-continuum' # 자동 저장 및 복구

# 재시작시 자동 복원 (가장 중요!)
# set -g @continuum-restore 'on'

# 15분마다 자동 저장
# set -g @continuum-save-interval '15'


# 상태바에 복원 상태 표시
set -g status-right 'Continuum: #{continuum_status}'

# 플러그인 리스트에 추가
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# (선택) 표시 스타일 커스터마이징
set -g @prefix_highlight_show_prefix_mode 'on'
set -g @prefix_highlight_output_prefix ' '
set -g @prefix_highlight_output_suffix ''
set -g @prefix_highlight_fg '#282a36'      # 글자색
set -g @prefix_highlight_bg '#bd93f9'      # 배경색 (Dracula 테마 예시)
set -g @prefix_highlight_copy_mode_attr 'fg=#f1fa8c,bg=#bd93f9'  # 복사모드 색상

# tree mux
set -g @treemux-tree-client 'nvim-tree'  # 또는 'neo-tree'
set -g @treemux-tree-nvim-init-file '~/.tmux/plugins/treemux/configs/treemux_init.lua'
set -g @plugin 'kiyoon/treemux'

# 텍스트 빠르게 선택
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key f

set -g @thumbs-capture-cursor 'on'
# set -g @thumbs-capture-lines '100'

# 현재 보이는 화면만 대상으로 검색 (스크롤백 제외)
# set -g @thumbs-start -0
# set -g @thumbs-end -0

set -g @thumbs-start -50
set -g @thumbs-end -0

# 시스템 클립보드 사용하도록
# set -g @thumbs-command 'echo -n "{}" | clip.exe && tmux display-message "Copied: {}"'
# set -g @thumbs-command 'echo -n "{}" | iconv -f UTF-8 -t UTF-16LE | clip.exe && tmux display-message "✓ Copied"'
set -g @thumbs-command 'echo -n "{}" | iconv -f UTF-8 -t UTF-16LE | clip.exe && tmux display-message "✓ Copied"'

# 입력 전문 정규식
set -g @thumbs-regexp-1 'requestMessage: \[.+\]' # Match emails
# set -g @thumbs-command 'echo -n "{}" | sed "s/requestMessage: \[//;s/\]$//" | clip.exe && tmux display-message "Copied: {}"'
set -g @thumbs-command 'echo -n "{}" | sed "s/requestMessage: \[//;s/\]$//" | iconv -f UTF-8 -t UTF-16LE | clip.exe && tmux display-message "✓ Copied"'


# plugin list end ==============================================================================================================================

# vi 모드 활성화
set -g mode-keys vi

unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l


# pane 간 이동
bind -n M-j select-pane -L
bind -n M-k select-pane -D
bind -n M-l select-pane -U
# bind -n C-\\; select-pane -R
bind -n M-";" select-pane -R
# bind -n M-\\; select-pane -R

# copy-mode 에서 설정
# 기존 hjkl 언바인드
unbind -T copy-mode-vi h
unbind -T copy-mode-vi j
unbind -T copy-mode-vi k  
unbind -T copy-mode-vi l

# jkl; 매핑
bind-key -T copy-mode-vi j send-keys -X cursor-left
bind-key -T copy-mode-vi k send-keys -X cursor-down
bind-key -T copy-mode-vi l send-keys -X cursor-up
bind-key -T copy-mode-vi ";" send-keys -X cursor-right

# 선택/복사 키 (편의상 v/y 유지)
# 복사모드 진입
unbind -T copy-mode-vi m
bind m copy-mode

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi u send-keys -X copy-selection-and-cancel

# Prefix + C: 화면&히스토리 clear
# bind C send-keys -R C-l \; clear-history

# Shift+마우스 드래그로 복사 후 시스템 클립보드에 저장
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Ctrl+Shift+V로 시스템 클립보드 붙여넣기
# bind-key -T prefix ] run-shell "xclip -selection clipboard -o | tmux load-buffer - ; tmux paste-buffer"


# 복사 시 Windows 클립보드에 저장 (UTF-8 유지)
bind-key -T copy-mode-vi h send -X copy-selection-and-cancel
bind-key -T copy-mode-vi g send -X copy-selection-and-cancel
# bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'tmux save-buffer - | iconv -f UTF-8 -t UTF-16LE | clip.exe'
# 마우스 드래그로 선택 후 자동으로 복사 + 클립보드 + 모드 종료
# bind-key -T copy-mode-vi MouseDragEnd1Pane run-shell -b 'tmux send-keys -X copy-selection && sleep 0.1 && tmux save-buffer - | iconv -f UTF-8 -t UTF-16LE | clip.exe && tmux send-keys -X cancel'
# bind-key -T copy-mode-vi MouseDragEnd1Pane run-shell -b 'tmux send-keys -X copy-selection && sleep 0.1 && tmux save-buffer - | iconv -f UTF-8 -t UTF-16LE | clip.exe'
# bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'echo -n "{}" | iconv -f UTF-8 -t UTF-16LE | clip.exe && tmux display-message "✓ Copied"'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux save-buffer - | iconv -f UTF-8 -t UTF-16LE | clip.exe"
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux save-buffer - | iconv -f UTF-8 -t UTF-8 | clip.exe"
# bind-key C-g run-shell "tmux capture-pane -p -N | clip.exe"
# bind-key C-g run-shell "tmux capture-pane -p -N"
# unbind-key -T copy-mode-vi MouseDragEnd1Pane
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "iconv -f UTF-8 -t UTF-16LE | clip.exe"
# bind-key -T copy-mode-vi MouseDragEnd1Pane \ send -X copy-pipe-and-cancel "clip.exe"
# bind-key -T copy-mode-vi g send -X copy-selection-and-cancel \; run-shell "tmux save-buffer - | clip.exe"
# bind-key -T copy-mode-vi g send -X copy-selection-and-cancel \; run-shell "tmux save-buffer - | clip.exe"

# Ctrl+Shift+V를 tmux prefix 없이 바로 붙여넣기로 사용
bind-key -n C-S-v run-shell "tmux set-buffer -- \"$(tmux save-buffer -)\"; tmux paste-buffer"

bind -r j resize-pane -L 5
bind -r k resize-pane -D 5
bind -r l resize-pane -U 5
bind -r ";" resize-pane -R 5

# SSH Selector (fzf)
# prefix + s: 팝업으로 SSH 선택기 실행
# bind-key l display-popup -E -w 80% -h 80% "/mnt/c/Users/jinpyo/AppData/Local/nvim/tmux/ssh-selector.sh"
# tmux.conf
# bind-key l display-popup -E -w 80% -h 80% "ORIGIN_PANE='#{pane_id}' /mnt/c/Users/jinpyo/AppData/Local/nvim/tmux/ssh-selector.sh"

bind-key h send-keys "/mnt/c/Users/jinpyo/AppData/Local/nvim/tmux/ssh-selector.sh" C-m
bind-key -n C-S-l send-keys "/mnt/c/Users/jinpyo/AppData/Local/nvim/tmux/ssh-selector.sh" C-m

# Ctrl+Shift+L: 새 창에서 SSH 선택기 실행 (팝업 미지원 시 대안)
# bind-key -n C-S-l new-window "/mnt/c/Users/jinpyo/AppData/Local/nvim/tmux/ssh-selector.sh"

# ------------------------------------------------
# ------------------------------------------------

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# root 테이블에서도 삭제 (중요!)
unbind -T root C-h
unbind -T root C-j
unbind -T root C-k
unbind -T root C-l
